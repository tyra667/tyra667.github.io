<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DashR</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1905225691499317"
     crossorigin="anonymous"></script>
<meta name="google-adsense-account" content="ca-pub-1905225691499317">
<script>
  if(window.matchMedia('(pointer:coarse)').matches){
    window.location.replace('game.html');
  }
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;min-height:100%;
  background:#0a0a0a;
  font-family:'Press Start 2P',monospace;
  overflow-x:hidden;
}

/* ── Fond scanlines CRT ── */
body::before{
  content:'';
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.15) 0px,
    rgba(0,0,0,0.15) 1px,
    transparent 1px,
    transparent 3px
  );
}

/* ── Layout 3 colonnes ── */
#layout{
  position:relative;z-index:1;
  display:flex;
  min-height:100vh;
  align-items:center;
  justify-content:center;
  gap:14px;
  padding:14px 10px;
}

/* ── Colonnes pub ── */
.ad-col{
  flex:0 0 160px;
  min-height:510px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:#111;
  border:2px solid #333;
  border-radius:4px;
  color:#555;
  font-size:7px;
  text-align:center;
  padding:10px 6px;
  letter-spacing:0.05em;
}
.ad-col::before{
  content:'[ PUB ]';
  font-size:7px;
  color:#444;
}
@media(max-width:1100px){.ad-col{display:none;}}

/* ── Colonne centrale ── */
#game-col{
  flex:0 0 auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

/* ── Titre arcade ── */
#arcade-title{
  font-size:28px;
  letter-spacing:6px;
  color:#fff;
  animation:flicker 5s infinite;
  user-select:none;
}
#arcade-title span{color:#aaa;}
@keyframes flicker{
  0%,93%,100%{opacity:1;}
  94%{opacity:0.6;}
  95%{opacity:1;}
  97%{opacity:0.4;}
  98%{opacity:1;}
}

/* INSERT COIN */
#insert-coin{
  font-size:7px;
  color:#888;
  letter-spacing:3px;
  animation:blink 1.1s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* Score bar */
#score-bar{
  display:flex;gap:24px;font-size:7px;
  color:#ccc;
  letter-spacing:1px;
}

/* ── Cadre borne arcade ── */
#arcade-bezel{
  position:relative;
  background:#111;
  border:3px solid #2a2a2a;
  border-radius:6px;
  padding:10px;
  box-shadow:
    0 0 0 2px #444,
    0 0 0 5px #1a1a1a,
    inset 0 0 16px rgba(0,0,0,0.9);
}
/* Coins décoratifs sobres */
#arcade-bezel::before,#arcade-bezel::after{
  content:'';
  position:absolute;width:14px;height:14px;
  border:2px solid #555;
}
#arcade-bezel::before{top:6px;left:6px;border-right:none;border-bottom:none;}
#arcade-bezel::after {bottom:6px;right:6px;border-left:none;border-top:none;}

#game-frame{
  border:none;
  display:block;
  width:640px;
  height:506px;
  border-radius:2px;
}

/* ── LEDs sobres (petits carrés pixelisés) ── */
#leds{
  display:flex;gap:5px;justify-content:center;
}
.led{
  width:6px;height:6px;
  border-radius:1px;
  animation:led-pulse 1.8s ease-in-out infinite;
}
.led:nth-child(odd) {background:#444;animation-delay:0s;}
.led:nth-child(even){background:#666;animation-delay:0.9s;}
@keyframes led-pulse{0%,100%{opacity:1;}50%{opacity:0.2;}}

/* ── Pub mobile ── */
#ad-bottom{
  display:none;
  width:100%;
  max-width:480px;
  min-height:70px;
  background:#111;
  border:2px solid #333;
  color:#555;
  font-size:7px;
  align-items:center;
  justify-content:center;
  border-radius:4px;
  text-align:center;
  letter-spacing:2px;
}
@media(max-width:1100px){#ad-bottom{display:flex;}}

/* ── Footer ── */
footer{
  font-size:6px;
  color:#333;
  letter-spacing:2px;
  text-align:center;
  padding:4px 8px;
}
footer span{color:#888;}
</style>
</head>
<body>
<div id="layout">

  <div class="ad-col" id="ad-left">Publicité</div>

  <div id="game-col">
    <div id="arcade-title">DASH<span>R</span></div>
    <div id="insert-coin">— INSERT COIN —</div>

    <div id="score-bar">
      <span>1UP &nbsp; 000000</span>
      <span>HI-SCORE &nbsp; 999999</span>
      <span>2UP &nbsp; 000000</span>
    </div>

    <div id="arcade-bezel">
      <iframe id="game-frame" src="game.html" title="DashR" scrolling="no"></iframe>
    </div>

    <div id="leds">
      <div class="led"></div><div class="led"></div><div class="led"></div>
      <div class="led"></div><div class="led"></div><div class="led"></div>
      <div class="led"></div>
    </div>

    <div id="ad-bottom">[ PUBLICITÉ ]</div>

    <footer>JEU CRÉÉ PAR <span>TYRA667</span> — DASHR © 2025</footer>
  </div>

  <div class="ad-col" id="ad-right">Publicité</div>

</div>
</body>
</html>
