<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DashR</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1905225691499317"
     crossorigin="anonymous"></script>
<meta name="google-adsense-account" content="ca-pub-1905225691499317">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;min-height:100%;background:#0f1f0f;font-family:'Courier New',monospace;}

  #layout{
    display:flex;
    min-height:100vh;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:10px;
  }

  .ad-col{
    flex:0 0 160px;
    min-height:510px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(255,255,255,0.03);
    border:1px dashed #334433;
    color:#556655;
    font-size:12px;
    text-align:center;
    border-radius:6px;
  }
  @media(max-width:1100px){.ad-col{display:none;}}

  #game-col{
    flex:0 0 auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
  }

  /* L'iframe enveloppe exactement le canvas + HUD + ctrl de game.html */
  #game-frame{
    border:none;
    display:block;
    width:640px;
    height:506px;   /* HUD ~32 + canvas 420 * (640/640) + ctrl ~30 + marges ~24 */
    background:#0f1f0f;
    border-radius:4px;
  }
  @media(max-width:700px){
    #game-frame{
      width:100vw;
      height:calc(100vw * 506 / 640);
    }
  }

  #ad-bottom{
    display:none;
    width:100%;
    max-width:480px;
    min-height:90px;
    background:rgba(255,255,255,0.03);
    border:1px dashed #334433;
    color:#556655;
    font-size:12px;
    align-items:center;
    justify-content:center;
    border-radius:6px;
    text-align:center;
  }
  @media(max-width:1100px){#ad-bottom{display:flex;}}

  footer{
    text-align:center;
    color:#445544;
    font-size:11px;
    padding:4px 8px;
  }
</style>
</head>
<body>
<div id="layout">
  <div class="ad-col" id="ad-left">Publicité</div>

  <div id="game-col">
    <iframe id="game-frame" src="game.html" title="DashR" scrolling="no"></iframe>
    <div id="ad-bottom">Publicité</div>
    <footer>Jeu créé par Tyra667 — DashR</footer>
  </div>

  <div class="ad-col" id="ad-right">Publicité</div>
</div>
</body>
</html>
